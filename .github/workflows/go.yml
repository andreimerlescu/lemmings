name: Go Lemmings
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        go-version: [ '1.25.x' ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          
      - name: Unit tests with race detector
        run: go test -race -count=1 -v ./...
        
      - name: Run test coverage
        run: go test -covermode=atomic -coverprofile=coverage.txt ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: ${{ matrix.os }}
          fail_ci_if_error: false # dont fail if codecov is offline
  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Benchmarks
        run: go test -bench=. -benchmem -run='^$' -count=1 ./...
  fuzz:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - FuzzDetectWaitingRoom
          - FuzzSha512sum
          - FuzzExtractSitemapLocs
          - FuzzExtractHTMLLinks
          - FuzzResolveURL
          - FuzzHandleAuth
          - FuzzDashboardHTML
          - FuzzFormatInt
          - FuzzFormatBytes
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Fuzz ${{ matrix.target }}
        run: go test -fuzz=${{ matrix.target }} -fuzztime=30s -run='^$' ./...
